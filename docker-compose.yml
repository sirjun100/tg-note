services:
  telegram-joplin:
    build: .
    container_name: telegram-joplin
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - LOGS_DB_PATH=/app/data/bot/bot_logs.db
      - STATE_DB_PATH=/app/data/bot/conversation_state.db
      - JOPLIN_PROFILE=/app/data/joplin
      - JOPLIN_WEB_CLIPPER_BASE_URL=http://localhost:41184
