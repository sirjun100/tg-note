# fly.toml app configuration file generated for joplin on 2026-02-25T19:03:28-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'joplin'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile.joplin'

[env]
  PORT = '41184'

[[mounts]]
  source = 'joplin_data'
  destination = '/root/.config/joplin'

[http_service]
  internal_port = 41184
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/ping'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
