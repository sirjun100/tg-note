app = 'telegram-joplin'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  # Joplin runs inside the same container — always localhost
  JOPLIN_WEB_CLIPPER_BASE_URL = 'http://localhost:41184'

[[mounts]]
  source = 'telegram_joplin_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  # Machine sleeps when idle, wakes when Telegram sends a webhook
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
