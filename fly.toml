# fly.toml app configuration file generated for telegram-joplin on 2026-02-25T19:09:40-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'telegram-joplin'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  # Use public URL - Fly's proxy routes to Joplin (private joplin.internal can fail with connection refused)
  JOPLIN_WEB_CLIPPER_BASE_URL = 'https://joplin.fly.dev'
  PORT = '8080'

[[mounts]]
  source = 'telegram_joplin_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
